<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>郵便番号検索</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Yu Gothic", "Meiryo", sans-serif;
      background: #f3f6fb;
      color: #111827;
    }
    .wrap {
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }
    .toolbar {
      padding: 18px 18px 12px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
    }
    .title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 700;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .label {
      font-size: 14px;
      font-weight: 700;
    }
    input[type="text"] {
      flex: 1 1 420px;
      min-width: 240px;
      height: 44px;
      padding: 0 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 16px;
      background: #fff;
    }
    button {
      height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #0f172a;
    }
    button.secondary {
      background: #6b7280;
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }
    .status {
      padding: 12px 18px 0;
      min-height: 28px;
      font-size: 14px;
      color: #374151;
    }
    .table-wrap {
      padding: 12px 18px 18px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      min-width: 1100px;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f8;
      color: #111827;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid #d1d5db;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
    }
    tbody td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      font-size: 14px;
      vertical-align: top;
      word-break: break-word;
      background: #fff;
    }
    tbody tr:hover td {
      background: #f8fafc;
    }
    .num {
      text-align: left;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .kana {
      font-size: 13px;
      color: #111827;
    }
    .rome {
      font-size: 13px;
      color: #111827;
      word-break: break-all;
    }
    .empty {
      padding: 20px 8px;
      color: #6b7280;
    }
    .footer-note {
      padding: 0 18px 18px;
      font-size: 12px;
      color: #6b7280;
    }
    @media (max-width: 768px) {
      .title {
        font-size: 20px;
      }
      input[type="text"] {
        flex-basis: 100%;
      }
      button {
        flex: 0 0 auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <h1 class="title">郵便番号検索</h1>
        <div class="row">
          <div class="label">検索:</div>
          <input id="q" type="text" placeholder="例：万博 / 国立民族 / 5658511 / 千代田" />
          <button id="searchBtn" type="button">検索</button>
          <button id="clearBtn" type="button" class="secondary">クリア</button>
        </div>
        <div class="hint">郵便番号はハイフンありでも可。文字検索は事業所名・事業所カナも対象。</div>
      </div>

      <div id="status" class="status"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 140px;">郵便番号</th>
              <th style="width: 150px;">都道府県</th>
              <th style="width: 150px;">市区町村</th>
              <th style="width: 420px;">町域/事業所</th>
              <th style="width: 390px;">カタカナ読み（事業所は名称カナ）</th>
              <th style="width: 360px;">ローマ字表記</th>
            </tr>
          </thead>
          <tbody id="resultsBody">
            <tr>
              <td colspan="6" class="empty">ここに検索結果が表示されます</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="footer-note">ローカル版と同じく一覧で確認する前提の表示です。</div>
    </div>
  </div>

  <script>
    const API_BASE = "/api/search";
    const qEl = document.getElementById("q");
    const searchBtn = document.getElementById("searchBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const resultsBodyEl = document.getElementById("resultsBody");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function clearResults(message = "ここに検索結果が表示されます") {
      resultsBodyEl.innerHTML = `
        <tr>
          <td colspan="6" class="empty">${escapeHtml(message)}</td>
        </tr>
      `;
    }

    function normalizeRows(data) {
      if (!data || !Array.isArray(data.results)) return [];
      return data.results.map(row => ({
        postal: row.postal ?? row.zipcode ?? "",
        pref: row.pref ?? "",
        city: row.city ?? "",
        town: row.town ?? row.address ?? "",
        kana: row.kana ?? "",
        rome: row.rome ?? ""
      }));
    }

    function renderResults(data) {
      const rows = normalizeRows(data);

      if (rows.length === 0) {
        clearResults("該当なし");
        return;
      }

      const html = rows.map((row) => `
        <tr>
          <td class="num">${escapeHtml(row.postal)}</td>
          <td>${escapeHtml(row.pref)}</td>
          <td>${escapeHtml(row.city)}</td>
          <td>${escapeHtml(row.town)}</td>
          <td class="kana">${escapeHtml(row.kana)}</td>
          <td class="rome">${escapeHtml(row.rome)}</td>
        </tr>
      `).join("");

      resultsBodyEl.innerHTML = html;
    }

    async function search() {
      const q = qEl.value.trim();
      if (!q) {
        setStatus("検索語を入れてください");
        clearResults("ここに検索結果が表示されます");
        return;
      }

      setStatus("検索中...");
      clearResults("検索中...");

      try {
        const res = await fetch(`${API_BASE}?q=${encodeURIComponent(q)}`, {
          method: "GET",
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        setStatus(`完了: ${data.count ?? 0}件`);
        renderResults(data);
      } catch (err) {
        setStatus(`エラー: ${err.message}`);
        clearResults("エラーが発生しました");
      }
    }

    searchBtn.addEventListener("click", search);

    clearBtn.addEventListener("click", () => {
      qEl.value = "";
      setStatus("");
      clearResults("ここに検索結果が表示されます");
      qEl.focus();
    });

    qEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        search();
      }
    });
  </script>
</body>
</html>
